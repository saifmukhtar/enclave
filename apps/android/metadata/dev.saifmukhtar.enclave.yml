  - Security
License: AGPL-3.0-only
SourceCode: https://github.com/saifmukhtar/enclave
IssueTracker: https://github.com/saifmukhtar/enclave/issues
WebSite: https://github.com/saifmukhtar/enclave

RepoType: git
Repo: https://github.com/saifmukhtar/enclave.git

Builds:
  - versionName: 1.1.0
    versionCode: 2
    commit: v1.1.0
    subdir: apps/android
    submodules: yes
    prebuild: |
      # Build the libsignal dependency from source inside the local Git submodule workspace
      cd ../../libsignal-src/java
      echo "sdk.dir=$ANDROID_HOME" > local.properties
      ./gradlew build -x test
      cd ../../apps/android
      
      # Create target libs directory inside Enclave main Android module
      mkdir -p app/libs
      # Copy the freshly compiled FOSS JNI release AAR and java client JAR
      cp ../../libsignal-src/java/android/build/outputs/aar/*-release.aar app/libs/
      cp ../../libsignal-src/java/client/build/libs/*.jar app/libs/
      # Inject the FOSS compiler properties flag
      printf "\nfdroid=true\n" >> gradle.properties
    gradle:
      - yes

AutoUpdateMode: Version
UpdateCheckMode: Tags
