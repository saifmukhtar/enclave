name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    # Deploy only when manually triggered or when the commit message includes the deploy keyword.
    if: "contains(github.event.head_commit.message, 'github-page') || github.event_name == 'workflow_dispatch'"
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: enclave-react/package-lock.json

      - name: Install React dependencies
        working-directory: ./enclave-react
        run: npm ci

      - name: Build React site
        working-directory: ./enclave-react
        run: npm run build
        env:
          # Automatically inject the details of whoever owns the repository (you, or anyone who forks it)
          VITE_AUTHOR_NAME: ${{ github.repository_owner }}
          VITE_AUTHOR_URL: https://github.com/${{ github.repository_owner }}
          VITE_REPO_URL: https://github.com/${{ github.repository }}
          VITE_INSTALL_SCRIPT_URL: https://enclave.${{ github.repository_owner }}.dev/install
      
      - name: Setup Pages
        uses: actions/configure-pages@v5
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './enclave-react/dist'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
